<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roast My Fit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { display: ['Bebas Neue', 'cursive'] },
        },
      },
    };
  </script>

  <style>
    html { font-size: clamp(14px, 1.8vw, 24px); }
    body { font-family: 'Inter', sans-serif; }

    /* ── column dividers (0.5px per spec) ── */
    #right-col { border-top: 0.5px solid #222; }
    @media (min-width: 768px) {
      #left-col  { border-right: 0.5px solid #222; }
      #right-col { border-top: none; }
    }

    /* ── slider thumb ── */
    #brutality-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: transparent;
      outline: none;
      cursor: pointer;
      position: relative;
      z-index: 1;
    }
    #brutality-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--thumb-color, #ef4444);
      border: 2px solid #111;
      box-shadow: 0 0 6px var(--thumb-color, #ef4444);
      cursor: pointer;
      transition: box-shadow 0.15s;
    }
    #brutality-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--thumb-color, #ef4444);
      border: 2px solid #111;
      box-shadow: 0 0 6px var(--thumb-color, #ef4444);
      cursor: pointer;
    }
    #brutality-slider:active::-webkit-slider-thumb {
      box-shadow: 0 0 14px var(--thumb-color, #ef4444);
    }

    /* ── slider fill gradient ── */
    #slider-fill {
      background: linear-gradient(to right, #a3e635, #facc15, #fb923c, #ef4444, #dc2626);
      background-repeat: no-repeat;
    }

    /* ── drop zone ── */
    #drop-zone {
      border: 1px dashed #333;
      transition: border-color 0.2s, background 0.2s;
    }
    #drop-zone.drag-over {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.05);
    }
    #drop-zone.has-image {
      border-style: solid;
      border-color: #333;
    }
    #drop-zone.has-image #upload-prompt {
      display: none;
    }

    /* ── output inner divider ── */
    .output-divider { border-top: 0.5px solid #222; }

    /* ── loading flicker ── */
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    #loading-icon { animation: flicker 1.2s ease-in-out infinite; }
  </style>
</head>

<body class="bg-[#0a0a0a] min-h-screen md:h-screen flex flex-col md:overflow-hidden">

  <div class="flex-1 bg-[#111] flex flex-col md:min-h-0">

    <!-- Header -->
    <header class="px-6 pt-3 pb-2 text-center">
      <h1 class="font-display text-white uppercase" style="font-size:3.5rem;letter-spacing:0.15em;">
        ROAST MY FIT
      </h1>
    </header>

    <!-- Two-column grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 md:flex-1 md:min-h-0">

      <!-- LEFT: controls -->
      <div id="left-col" class="p-5 md:pt-0 flex flex-col gap-3 md:overflow-y-auto">

        <!-- Upload zone -->
        <div class="flex flex-col gap-1 flex-1 min-h-0">
        <div id="drop-zone"
             class="rounded-lg bg-[#0a0a0a] p-4 flex flex-col items-center justify-center gap-3 cursor-pointer select-none flex-1 min-h-0">

          <div id="upload-prompt" class="flex flex-col items-center gap-2 text-center">
            <svg class="w-8 h-8 text-[#444]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
            </svg>
            <p class="text-[#888] text-xs font-medium">Drop your fit here</p>
            <p class="text-[#555] text-[0.6875rem]">or tap to choose</p>
          </div>

          <div id="preview" class="hidden w-full h-full">
            <img id="preview-img" src="" alt="Outfit preview"
                 class="w-full h-full rounded-md object-contain" />
          </div>

          <input id="file-input" type="file" accept="image/*" class="hidden" />
        </div>
        <p id="upload-hint" class="hidden text-center text-[#555]" style="font-size:0.5625rem;">Click the box to upload a different image</p>
        </div>

        <!-- Brutality slider -->
        <div class="flex flex-col gap-1">
          <div class="flex justify-between items-center">
            <span class="text-[#888] text-[0.6875rem] uppercase tracking-widest">Brutality</span>
            <span id="slider-val" class="text-sm font-medium">3</span>
          </div>

          <div class="relative h-5 flex items-center">
            <div class="absolute inset-x-0 h-[6px] rounded-full bg-[#222]"></div>
            <div id="slider-fill" class="absolute left-0 h-[6px] rounded-full" style="width:50%"></div>
            <input id="brutality-slider" type="range" min="1" max="5" value="3" step="1" class="relative w-full" />
          </div>

          <div id="slider-labels" class="flex justify-between text-center leading-tight" style="font-size:0.5625rem;">
            <span class="w-1/5">Polite</span>
            <span class="w-1/5">Disap&shy;pointed</span>
            <span class="w-1/5">Night&shy;mare</span>
            <span class="w-1/5">Hell's<br/>kitchen</span>
            <span class="w-1/5 font-medium">IT'S<br/>RAW</span>
          </div>

          <div id="slider-emoji" class="text-center text-lg leading-none">😈</div>
        </div>

        <!-- Roast button -->
        <button id="roast-btn" disabled
                class="w-full py-2 rounded-lg bg-[#ef4444] text-white font-medium uppercase text-sm
                       tracking-[0.08em] transition-colors duration-150
                       disabled:opacity-30 disabled:cursor-not-allowed
                       enabled:hover:bg-[#dc2626]">
          ROAST ME
        </button>

      </div>

      <!-- RIGHT: output -->
      <div id="right-col" class="p-5 md:pt-0 flex flex-col">

        <div class="rounded-lg bg-[#0d0d0d] flex-1 min-h-0 flex flex-col p-5 md:overflow-y-auto">

          <!-- Loading -->
          <div id="loading" class="hidden flex flex-col items-center justify-center flex-1 gap-3">
            <span id="loading-icon" class="text-3xl">🔥</span>
            <p class="text-[#555] text-xs">Get ready to be roasted...</p>
          </div>

          <!-- Error -->
          <p id="error-msg" class="hidden text-red-500 text-xs text-center py-10"></p>

          <!-- Output -->
          <div id="output" class="hidden flex flex-col gap-4">

            <div>
              <p class="text-[0.75rem] uppercase tracking-[0.06em] mb-2 text-[#ef4444]">The Roast</p>
              <p id="roast-text" class="text-[#ccc] text-[0.8125rem] leading-relaxed whitespace-pre-wrap"></p>
            </div>

            <div class="output-divider"></div>

            <div>
              <p class="text-[0.75rem] uppercase tracking-[0.06em] mb-2 text-[#2dd4bf]">Real Talk</p>
              <p id="feedback-text" class="text-[#888] text-[0.8125rem] leading-relaxed whitespace-pre-wrap"></p>
            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <script src="/src/app.js"></script>

  <script>
    const _s = document.getElementById('brutality-slider');
    const _v = document.getElementById('slider-val');
    _s.addEventListener('input', () => _v.textContent = _s.value);
  </script>
</body>
</html>
